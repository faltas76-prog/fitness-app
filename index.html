<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Fitness App</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

</head>
<body>

<h1>🏋️ Fitness Planner</h1>

<div class="container">

  <button onclick="requestNotificationPermission()">🔔 Povolit připomínky</button>

  <h2>📅 Týdenní plán</h2>
  <ul id="workoutList"></ul>

  <h2>🍽️ Jídelníček</h2>
  <ul id="mealList"></ul>

  <h2>⚖️ Váha</h2>
  <input type="number" id="weightInput" placeholder="Zadej váhu">
  <button onclick="saveWeight()">Uložit</button>
  <p id="weightDisplay"></p>

  <h2>🤖 AI Trenér</h2>
  <input type="text" id="aiInput" placeholder="Zeptej se...">
  <button onclick="askAI()">Odeslat</button>
  <p id="aiResponse"></p>
  <p id="progress"></p>
<button onclick="startTimer(60)">⏱️ Start pauzy (60s)</button>
<p id="timer"></p>

</div>

<script src="app.js"></script>
</body>
</html>
