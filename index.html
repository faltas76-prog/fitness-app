<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Fitness App</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🏋️ Fitness Planner</h1>

<div class="container">

  <p id="progress"></p>
  <p id="streak"></p>

  <button onclick="startTimer(60)">⏱️ Start pauzy</button>
  <p id="timer"></p>

  <h2>📅 Trénink</h2>
  <div id="workoutList"></div>

  <h2>⚖️ Váha</h2>
  <input type="number" id="weightInput" placeholder="Zadej váhu">
  <button onclick="saveWeight()">Uložit</button>

  <canvas id="weightChart"></canvas>

  <h2>🤖 AI Trenér</h2>
  <input type="text" id="aiInput">
  <button onclick="askAI()">Odeslat</button>
  <p id="aiResponse"></p>

</div>

<script src="app.js"></script>
</body>
</html>
